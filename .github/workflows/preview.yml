# .github/workflows/preview.yml
# This is a basic workflow takes care of building and deploying
# client when creating merge request

name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed # pr-preview-action will do cleanup here, but build steps can be skipped

# do not allow running multiple of pipelines for this PR in parallel
concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-24.04
    env:
      EODASH_OPENCAGE: ${{ secrets.EODASH_OPENCAGE }}
    permissions:
      contents: write
      pages: write
      pull-requests: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      # This checks out "main" first for Check for changes step
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check for changes to prevent modification of build scripts
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          # Define what is "unsafe" to change
          filters: |
            unsafe_files:
              - 'package.json'
              - 'package-lock.json'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - if: steps.filter.outputs.unsafe_files == 'false' && github.event.action != 'closed'
        run: |
          npm install
          npm run docs:build -- --base /pr-preview/pr-${{ github.event.number }}/
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: .vitepress/dist/
